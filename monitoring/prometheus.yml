global:
  scrape_interval: 5s
  evaluation_interval: 5s

scrape_configs:
  - job_name: realtime-messaging
    metrics_path: /actuator/prometheus
    static_configs:
      # The app runs on the host (gradlew bootRun); reach it from inside the container via
      # host.docker.internal. Add/remove targets to match how many instances you run.
      - targets:
          - host.docker.internal:8080
          - host.docker.internal:8081

spring:
  application:
    name: realtime-messaging
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}

server:
  port: ${SERVER_PORT:8080}

app:
  # Surfaced in the demo client so cross-instance routing is visible. Override per process,
  # e.g. SERVER_PORT=8081 INSTANCE_ID=instance-2 ./gradlew bootRun
  instance-id: ${INSTANCE_ID:instance-1}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus, metrics
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}
      instance: ${app.instance-id}

logging:
  level:
    com.portfolio.realtime: DEBUG
